<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rondón · Elefantes Rosa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400;1,600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:linear-gradient(165deg,#1A0A2E 0%,#0D0618 100%);font-family:"Manrope",sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.25rem;}
.wrap{width:100%;max-width:420px;text-align:center;}
.brand{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:15px;letter-spacing:1px;color:#F4A8C0;margin-bottom:.4rem;}
.name{font-size:13px;font-weight:800;letter-spacing:6px;text-transform:uppercase;color:#fff;margin-bottom:.25rem;}
.tagline{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:17px;color:#ffffffcc;margin-bottom:2.25rem;}
.songs{display:flex;flex-direction:column;gap:14px;}
.song{display:flex;align-items:center;gap:14px;background:#ffffff0d;border:1px solid #E8007D33;border-radius:16px;padding:16px 18px;text-decoration:none;color:#fff;transition:transform .18s cubic-bezier(.34,1.56,.64,1),background .18s,border-color .18s;text-align:left;}
.song:hover{transform:translateY(-3px);background:#ffffff14;border-color:#E8007D88;}
.song-art{width:46px;height:46px;border-radius:11px;background:linear-gradient(145deg,#E8007D,#641CD5);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.song-info{flex:1;min-width:0;}
.song-title{font-size:15px;font-weight:700;}
.song-sub{font-size:12px;color:#ffffff99;margin-top:1px;}
.song-go{font-size:18px;color:#F4A8C0;}
.song.soon{opacity:.5;pointer-events:none;}
.song.soon .song-go{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ffffff77;}
.foot{margin-top:2.5rem;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#ffffff44;}
.ig{display:inline-block;margin-top:.75rem;color:#F4A8C0;text-decoration:none;font-size:13px;font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Elefantes Rosa</div>
  <div class="name">Rondón</div>
  <div class="tagline">El poeta migrante</div>

  <div class="songs">
    <a class="song" href="/hazmesentirquevuelo">
      <div class="song-art">&#129666;</div>
      <div class="song-info">
        <div class="song-title">Hazme Sentir Que Vuelo</div>
        <div class="song-sub">Crea tu video · Single 9 junio</div>
      </div>
      <div class="song-go">&#8594;</div>
    </a>

    <div class="song soon">
      <div class="song-art">&#10024;</div>
      <div class="song-info">
        <div class="song-title">Nueva canción</div>
        <div class="song-sub">Muy pronto</div>
      </div>
      <div class="song-go">Pronto</div>
    </div>
  </div>

  <a class="ig" href="https://www.instagram.com/soy.rondon?igsh=MWl2bmRmc3FnbWVveQ%3D%3D&utm_source=qr" target="_blank" rel="noopener">@soy.rondon</a>
  <div class="foot">Rondón · Elefantes Rosa · 2026</div>
</div>
</body>
</html>
